<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 350" font-family="Segoe UI, Arial, sans-serif">
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Tipos de Fallos de Caché (Las 3 C)</text>

  <!-- Forzosos (Compulsory) -->
  <rect x="20" y="50" width="210" height="270" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="125" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Forzosos</text>
  <text x="125" y="96" text-anchor="middle" font-size="10" fill="#3b82f6">(Compulsory / Cold Start)</text>

  <rect x="35" y="110" width="180" height="60" rx="5" fill="#dbeafe"/>
  <text x="125" y="132" text-anchor="middle" font-size="9" fill="#1e3a8a">Primer acceso a un bloque</text>
  <text x="125" y="148" text-anchor="middle" font-size="9" fill="#1e3a8a">que nunca ha estado en caché</text>
  <text x="125" y="163" text-anchor="middle" font-size="9" fill="#1e3a8a">→ Inevitables</text>

  <rect x="35" y="180" width="180" height="45" rx="5" fill="#f0f9ff"/>
  <text x="125" y="198" text-anchor="middle" font-size="9" fill="#475569">Analogía: la primera vez que</text>
  <text x="125" y="213" text-anchor="middle" font-size="9" fill="#475569">buscas un libro nuevo</text>

  <rect x="35" y="235" width="180" height="70" rx="5" fill="#e0f2fe"/>
  <text x="125" y="253" text-anchor="middle" font-size="9" fill="#0369a1" font-weight="bold">Reducción:</text>
  <text x="125" y="268" text-anchor="middle" font-size="9" fill="#0369a1">• Prefetching</text>
  <text x="125" y="283" text-anchor="middle" font-size="9" fill="#0369a1">• Bloques más grandes</text>
  <text x="125" y="298" text-anchor="middle" font-size="9" fill="#0369a1">  (pero con cuidado)</text>

  <!-- Capacidad -->
  <rect x="250" y="50" width="210" height="270" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="355" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">Capacidad</text>
  <text x="355" y="96" text-anchor="middle" font-size="10" fill="#dc2626">(Capacity)</text>

  <rect x="265" y="110" width="180" height="60" rx="5" fill="#fee2e2"/>
  <text x="355" y="132" text-anchor="middle" font-size="9" fill="#7f1d1d">La caché no puede contener</text>
  <text x="355" y="148" text-anchor="middle" font-size="9" fill="#7f1d1d">todos los bloques necesarios</text>
  <text x="355" y="163" text-anchor="middle" font-size="9" fill="#7f1d1d">→ Se expulsan bloques útiles</text>

  <rect x="265" y="180" width="180" height="45" rx="5" fill="#fff1f2"/>
  <text x="355" y="198" text-anchor="middle" font-size="9" fill="#475569">Analogía: escritorio pequeño</text>
  <text x="355" y="213" text-anchor="middle" font-size="9" fill="#475569">→ hay que mover cosas</text>

  <rect x="265" y="235" width="180" height="70" rx="5" fill="#ffe4e6"/>
  <text x="355" y="253" text-anchor="middle" font-size="9" fill="#9f1239" font-weight="bold">Reducción:</text>
  <text x="355" y="268" text-anchor="middle" font-size="9" fill="#9f1239">• Caché más grande</text>
  <text x="355" y="283" text-anchor="middle" font-size="9" fill="#9f1239">• Mejor reemplazo (LRU)</text>
  <text x="355" y="298" text-anchor="middle" font-size="9" fill="#9f1239">• Optimización de código</text>

  <!-- Conflicto -->
  <rect x="480" y="50" width="220" height="270" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="590" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">Conflicto</text>
  <text x="590" y="96" text-anchor="middle" font-size="10" fill="#ca8a04">(Conflict / Collision)</text>

  <rect x="495" y="110" width="190" height="60" rx="5" fill="#fef9c3"/>
  <text x="590" y="132" text-anchor="middle" font-size="9" fill="#713f12">Varios bloques compiten</text>
  <text x="590" y="148" text-anchor="middle" font-size="9" fill="#713f12">por la misma línea/conjunto</text>
  <text x="590" y="163" text-anchor="middle" font-size="9" fill="#713f12">→ Solo en directa y asoc. conj.</text>

  <rect x="495" y="180" width="190" height="45" rx="5" fill="#fefce8"/>
  <text x="590" y="198" text-anchor="middle" font-size="9" fill="#475569">Analogía: varios libros que solo</text>
  <text x="590" y="213" text-anchor="middle" font-size="9" fill="#475569">caben en el mismo estante</text>

  <rect x="495" y="235" width="190" height="70" rx="5" fill="#fef3c7"/>
  <text x="590" y="253" text-anchor="middle" font-size="9" fill="#92400e" font-weight="bold">Reducción:</text>
  <text x="590" y="268" text-anchor="middle" font-size="9" fill="#92400e">• Mayor asociatividad</text>
  <text x="590" y="283" text-anchor="middle" font-size="9" fill="#92400e">• Victim cache</text>
  <text x="590" y="298" text-anchor="middle" font-size="9" fill="#92400e">• Compiler optimizations</text>

  <!-- Nota inferior -->
  <text x="360" y="340" text-anchor="middle" font-size="10" fill="#64748b">En caché completamente asociativa no hay fallos de conflicto (solo forzosos y capacidad)</text>
</svg>
