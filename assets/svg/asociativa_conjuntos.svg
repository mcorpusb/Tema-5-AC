<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Segoe UI, Arial, sans-serif">
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Correspondencia Asociativa por Conjuntos (2 vías)</text>

  <!-- Dirección -->
  <text x="40" y="52" font-size="11" fill="#475569" font-weight="bold">Dirección:</text>
  <rect x="115" y="38" width="130" height="26" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="180" y="56" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Etiqueta</text>
  <rect x="245" y="38" width="100" height="26" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="295" y="56" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Índice conj.</text>
  <rect x="345" y="38" width="90" height="26" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="390" y="56" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Desplaz.</text>

  <!-- Caché asociativa por conjuntos -->
  <text x="200" y="95" text-anchor="middle" font-size="12" fill="#475569" font-weight="bold">Caché (2 vías por conjunto)</text>

  <!-- Encabezados -->
  <text x="125" y="115" text-anchor="middle" font-size="9" fill="#64748b" font-weight="bold">Vía 0</text>
  <text x="360" y="115" text-anchor="middle" font-size="9" fill="#64748b" font-weight="bold">Vía 1</text>

  <!-- Conjunto 0 -->
  <text x="30" y="140" font-size="9" fill="#1e40af" font-weight="bold">Conj 0</text>
  <rect x="65" y="125" width="20" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="75" y="140" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="85" y="125" width="55" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="112" y="140" text-anchor="middle" font-size="7" fill="#92400e">Tag</text>
  <rect x="140" y="125" width="80" height="22" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="180" y="140" text-anchor="middle" font-size="7" fill="#475569">Datos</text>

  <rect x="240" y="125" width="20" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="250" y="140" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="260" y="125" width="55" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="287" y="140" text-anchor="middle" font-size="7" fill="#92400e">Tag</text>
  <rect x="315" y="125" width="80" height="22" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="355" y="140" text-anchor="middle" font-size="7" fill="#475569">Datos</text>

  <!-- Conjunto 1 -->
  <text x="30" y="170" font-size="9" fill="#1e40af" font-weight="bold">Conj 1</text>
  <rect x="65" y="155" width="20" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="75" y="170" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="85" y="155" width="55" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="112" y="170" text-anchor="middle" font-size="7" fill="#92400e">Tag</text>
  <rect x="140" y="155" width="80" height="22" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="180" y="170" text-anchor="middle" font-size="7" fill="#475569">Datos</text>

  <rect x="240" y="155" width="20" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="250" y="170" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="260" y="155" width="55" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="287" y="170" text-anchor="middle" font-size="7" fill="#92400e">Tag</text>
  <rect x="315" y="155" width="80" height="22" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="355" y="170" text-anchor="middle" font-size="7" fill="#475569">Datos</text>

  <!-- Conjunto 2 -->
  <text x="30" y="200" font-size="9" fill="#1e40af" font-weight="bold">Conj 2</text>
  <rect x="65" y="185" width="20" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="75" y="200" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="85" y="185" width="55" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="112" y="200" text-anchor="middle" font-size="7" fill="#92400e">Tag</text>
  <rect x="140" y="185" width="80" height="22" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="180" y="200" text-anchor="middle" font-size="7" fill="#475569">Datos</text>

  <rect x="240" y="185" width="20" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="250" y="200" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="260" y="185" width="55" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="287" y="200" text-anchor="middle" font-size="7" fill="#92400e">Tag</text>
  <rect x="315" y="185" width="80" height="22" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="355" y="200" text-anchor="middle" font-size="7" fill="#475569">Datos</text>

  <!-- Conjunto 3 -->
  <text x="30" y="230" font-size="9" fill="#1e40af" font-weight="bold">Conj 3</text>
  <rect x="65" y="215" width="20" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="75" y="230" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="85" y="215" width="55" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="112" y="230" text-anchor="middle" font-size="7" fill="#92400e">Tag</text>
  <rect x="140" y="215" width="80" height="22" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="180" y="230" text-anchor="middle" font-size="7" fill="#475569">Datos</text>

  <rect x="240" y="215" width="20" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="250" y="230" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="260" y="215" width="55" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="287" y="230" text-anchor="middle" font-size="7" fill="#92400e">Tag</text>
  <rect x="315" y="215" width="80" height="22" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="355" y="230" text-anchor="middle" font-size="7" fill="#475569">Datos</text>

  <!-- Explicación -->
  <rect x="430" y="100" width="270" height="150" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="565" y="125" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">Funcionamiento</text>
  <text x="445" y="148" font-size="9" fill="#475569">1. El índice selecciona el conjunto</text>
  <text x="445" y="166" font-size="9" fill="#475569">2. Se compara la etiqueta con</text>
  <text x="450" y="181" font-size="9" fill="#475569">   TODAS las vías en paralelo</text>
  <text x="445" y="199" font-size="9" fill="#475569">3. Si hay coincidencia → HIT</text>
  <text x="445" y="217" font-size="9" fill="#475569">4. Si no → MISS → reemplazo</text>
  <text x="445" y="238" font-size="9" fill="#1e40af" font-weight="bold">Reduce conflictos vs directa</text>

  <!-- Nota -->
  <rect x="80" y="265" width="560" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="282" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold">Compromiso: más vías = menos conflictos pero mayor tiempo de búsqueda</text>
  <text x="360" y="298" text-anchor="middle" font-size="9" fill="#475569">Directa (1 vía) ↔ Asociativa por conjuntos (n vías) ↔ Completamente asociativa (todas las vías)</text>
</svg>
