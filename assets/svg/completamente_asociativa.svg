<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" font-family="Segoe UI, Arial, sans-serif">
  <text x="320" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Correspondencia Completamente Asociativa</text>

  <!-- Dirección -->
  <text x="40" y="52" font-size="10" fill="#475569" font-weight="bold">Dirección:</text>
  <rect x="130" y="38" width="200" height="26" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="230" y="55" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Etiqueta (tag)</text>
  <rect x="330" y="38" width="100" height="26" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="55" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Desplaz.</text>
  <text x="455" y="55" font-size="9" fill="#94a3b8">(sin índice)</text>

  <!-- Caché -->
  <text x="80" y="90" font-size="11" fill="#475569" font-weight="bold">Caché (todas las líneas)</text>

  <!-- Comparadores -->
  <rect x="60" y="100" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="70" y="114" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="80" y="100" width="100" height="20" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="130" y="114" text-anchor="middle" font-size="8" fill="#92400e">Tag A</text>
  <rect x="180" y="100" width="120" height="20" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="240" y="114" text-anchor="middle" font-size="8" fill="#475569">Datos</text>
  <text x="320" y="114" font-size="8" fill="#94a3b8">= ?</text>

  <rect x="60" y="122" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="70" y="136" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="80" y="122" width="100" height="20" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="130" y="136" text-anchor="middle" font-size="8" fill="#92400e">Tag B</text>
  <rect x="180" y="122" width="120" height="20" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="240" y="136" text-anchor="middle" font-size="8" fill="#475569">Datos</text>
  <text x="320" y="136" font-size="8" fill="#94a3b8">= ?</text>

  <rect x="60" y="144" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="70" y="158" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="80" y="144" width="100" height="20" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="130" y="158" text-anchor="middle" font-size="8" fill="#92400e">Tag C</text>
  <rect x="180" y="144" width="120" height="20" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="240" y="158" text-anchor="middle" font-size="8" fill="#475569">Datos</text>
  <text x="320" y="158" font-size="8" fill="#94a3b8">= ?</text>

  <rect x="60" y="166" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="70" y="180" text-anchor="middle" font-size="7" fill="#475569">V</text>
  <rect x="80" y="166" width="100" height="20" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="130" y="180" text-anchor="middle" font-size="8" fill="#92400e">Tag D</text>
  <rect x="180" y="166" width="120" height="20" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="240" y="180" text-anchor="middle" font-size="8" fill="#475569">Datos</text>
  <text x="320" y="180" font-size="8" fill="#94a3b8">= ?</text>

  <!-- Comparación en paralelo -->
  <rect x="350" y="100" width="4" height="86" fill="#d97706"/>
  <text x="375" y="148" font-size="10" fill="#d97706" font-weight="bold">Comparación</text>
  <text x="375" y="164" font-size="10" fill="#d97706" font-weight="bold">en paralelo</text>

  <!-- Resultado -->
  <rect x="470" y="125" width="140" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="540" y="145" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">HIT / MISS</text>
  <text x="540" y="160" text-anchor="middle" font-size="8" fill="#475569">+ datos si acierto</text>

  <defs><marker id="aA" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#16a34a"/></marker></defs>
  <line x1="430" y1="145" x2="468" y2="145" stroke="#16a34a" stroke-width="2" marker-end="url(#aA)"/>

  <!-- Pros/contras -->
  <rect x="60" y="205" width="260" height="60" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="190" y="225" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="bold">Ventajas</text>
  <text x="190" y="240" text-anchor="middle" font-size="9" fill="#166534">• Sin fallos de conflicto</text>
  <text x="190" y="255" text-anchor="middle" font-size="9" fill="#166534">• Máxima flexibilidad de ubicación</text>

  <rect x="340" y="205" width="260" height="60" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="470" y="225" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="bold">Desventajas</text>
  <text x="470" y="240" text-anchor="middle" font-size="9" fill="#991b1b">• Comparación lenta (muchos comp.)</text>
  <text x="470" y="255" text-anchor="middle" font-size="9" fill="#991b1b">• Coste hardware elevado</text>
