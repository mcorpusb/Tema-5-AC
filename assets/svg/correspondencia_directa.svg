<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="Segoe UI, Arial, sans-serif">
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Correspondencia Directa (Direct Mapping)</text>

  <!-- Dirección de memoria -->
  <text x="40" y="55" font-size="11" fill="#475569" font-weight="bold">Dirección de memoria:</text>
  <rect x="40" y="62" width="140" height="30" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="110" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Etiqueta (tag)</text>
  <rect x="180" y="62" width="120" height="30" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="240" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Índice (línea)</text>
  <rect x="300" y="62" width="100" height="30" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="350" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Desplazamiento</text>

  <!-- Memoria principal (izquierda) -->
  <text x="40" y="125" font-size="11" fill="#475569" font-weight="bold">Memoria principal</text>
  <rect x="40" y="132" width="120" height="22" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="100" y="148" text-anchor="middle" font-size="9" fill="#7f1d1d">Bloque 0</text>
  <rect x="40" y="154" width="120" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="100" y="170" text-anchor="middle" font-size="9" fill="#78350f">Bloque 1</text>
  <rect x="40" y="176" width="120" height="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="100" y="192" text-anchor="middle" font-size="9" fill="#14532d">Bloque 2</text>
  <rect x="40" y="198" width="120" height="22" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="100" y="214" text-anchor="middle" font-size="9" fill="#1e3a8a">Bloque 3</text>
  <rect x="40" y="220" width="120" height="22" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="100" y="236" text-anchor="middle" font-size="9" fill="#7f1d1d">Bloque 4</text>
  <rect x="40" y="242" width="120" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="100" y="258" text-anchor="middle" font-size="9" fill="#78350f">Bloque 5</text>
  <rect x="40" y="264" width="120" height="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="100" y="280" text-anchor="middle" font-size="9" fill="#14532d">Bloque 6</text>
  <rect x="40" y="286" width="120" height="22" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="100" y="302" text-anchor="middle" font-size="9" fill="#1e3a8a">Bloque 7</text>

  <!-- Flechas -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <line x1="160" y1="143" x2="340" y2="165" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <line x1="160" y1="165" x2="340" y2="187" stroke="#d97706" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <line x1="160" y1="187" x2="340" y2="209" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <line x1="160" y1="209" x2="340" y2="231" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <line x1="160" y1="231" x2="340" y2="165" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <line x1="160" y1="253" x2="340" y2="187" stroke="#d97706" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <line x1="160" y1="275" x2="340" y2="209" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <line x1="160" y1="297" x2="340" y2="231" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>

  <!-- Caché (derecha) -->
  <text x="360" y="125" font-size="11" fill="#475569" font-weight="bold">Caché</text>
  <rect x="345" y="132" width="30" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="360" y="147" text-anchor="middle" font-size="8" fill="#475569">V</text>
  <rect x="375" y="132" width="80" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="415" y="147" text-anchor="middle" font-size="8" fill="#92400e">Tag</text>
  <rect x="455" y="132" width="120" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="515" y="147" text-anchor="middle" font-size="8" fill="#475569">Datos</text>

  <rect x="345" y="154" width="30" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="360" y="169" text-anchor="middle" font-size="8" fill="#475569">V</text>
  <rect x="375" y="154" width="80" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="415" y="169" text-anchor="middle" font-size="8" fill="#92400e">Tag</text>
  <rect x="455" y="154" width="120" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="515" y="169" text-anchor="middle" font-size="8" fill="#475569">Datos</text>

  <rect x="345" y="176" width="30" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="360" y="191" text-anchor="middle" font-size="8" fill="#475569">V</text>
  <rect x="375" y="176" width="80" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="415" y="191" text-anchor="middle" font-size="8" fill="#92400e">Tag</text>
  <rect x="455" y="176" width="120" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="515" y="191" text-anchor="middle" font-size="8" fill="#475569">Datos</text>

  <rect x="345" y="198" width="30" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="360" y="213" text-anchor="middle" font-size="8" fill="#475569">V</text>
  <rect x="375" y="198" width="80" height="22" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="415" y="213" text-anchor="middle" font-size="8" fill="#92400e">Tag</text>
  <rect x="455" y="198" width="120" height="22" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="515" y="213" text-anchor="middle" font-size="8" fill="#475569">Datos</text>

  <!-- Línea labels -->
  <text x="590" y="148" font-size="9" fill="#64748b">Línea 0</text>
  <text x="590" y="170" font-size="9" fill="#64748b">Línea 1</text>
  <text x="590" y="192" font-size="9" fill="#64748b">Línea 2</text>
  <text x="590" y="214" font-size="9" fill="#64748b">Línea 3</text>

  <!-- Fórmula -->
  <text x="360" y="260" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">Línea = Bloque mod N.º líneas caché</text>
  <text x="360" y="280" text-anchor="middle" font-size="10" fill="#64748b">Ejemplo: Bloque 5 → 5 mod 4 = Línea 1</text>
  <text x="360" y="298" text-anchor="middle" font-size="10" fill="#64748b">Ejemplo: Bloque 7 → 7 mod 4 = Línea 3</text>

  <!-- Conflicto -->
  <rect x="240" y="310" width="240" height="25" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="360" y="327" text-anchor="middle" font-size="9" fill="#991b1b">⚠ Bloques 0 y 4 compiten por la misma línea 0</text>
</svg>
