<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 400" font-family="Segoe UI, Arial, sans-serif">
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Traducción de Direcciones y TLB</text>

  <defs>
    <marker id="aRt" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Dirección virtual -->
  <text x="40" y="55" font-size="11" fill="#334155" font-weight="bold">Dirección virtual:</text>
  <rect x="190" y="38" width="200" height="28" rx="4" fill="#c4b5fd" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="290" y="57" text-anchor="middle" font-size="10" fill="#4c1d95" font-weight="bold">N.º página virtual (VPN)</text>
  <rect x="390" y="38" width="140" height="28" rx="4" fill="#e9d5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="460" y="57" text-anchor="middle" font-size="10" fill="#4c1d95" font-weight="bold">Desplazamiento</text>

  <!-- TLB -->
  <rect x="120" y="90" width="360" height="120" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="300" y="112" text-anchor="middle" font-size="12" fill="#92400e" font-weight="bold">TLB (Translation Lookaside Buffer)</text>

  <!-- Entradas TLB -->
  <rect x="140" y="120" width="80" height="18" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="180" y="133" text-anchor="middle" font-size="8" fill="#78350f" font-weight="bold">VPN</text>
  <rect x="220" y="120" width="80" height="18" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="260" y="133" text-anchor="middle" font-size="8" fill="#78350f" font-weight="bold">PPN</text>
  <rect x="300" y="120" width="40" height="18" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="320" y="133" text-anchor="middle" font-size="8" fill="#78350f" font-weight="bold">V</text>
  <rect x="340" y="120" width="40" height="18" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="360" y="133" text-anchor="middle" font-size="8" fill="#78350f" font-weight="bold">D</text>
  <rect x="380" y="120" width="80" height="18" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="420" y="133" text-anchor="middle" font-size="8" fill="#78350f" font-weight="bold">Permisos</text>

  <rect x="140" y="140" width="80" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.5"/>
  <text x="180" y="152" text-anchor="middle" font-size="7" fill="#78350f">0x1A</text>
  <rect x="220" y="140" width="80" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.5"/>
  <text x="260" y="152" text-anchor="middle" font-size="7" fill="#78350f">0x3F</text>
  <rect x="300" y="140" width="40" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.5"/>
  <text x="320" y="152" text-anchor="middle" font-size="7" fill="#78350f">1</text>
  <rect x="340" y="140" width="40" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.5"/>
  <text x="360" y="152" text-anchor="middle" font-size="7" fill="#78350f">0</text>
  <rect x="380" y="140" width="80" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.5"/>
  <text x="420" y="152" text-anchor="middle" font-size="7" fill="#78350f">RW-</text>

  <rect x="140" y="158" width="80" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.5"/>
  <text x="180" y="170" text-anchor="middle" font-size="7" fill="#78350f">0x0B</text>
  <rect x="220" y="158" width="80" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.5"/>
  <text x="260" y="170" text-anchor="middle" font-size="7" fill="#78350f">0x72</text>
  <rect x="300" y="158" width="40" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.5"/>
  <text x="320" y="170" text-anchor="middle" font-size="7" fill="#78350f">1</text>
  <rect x="340" y="158" width="40" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.5"/>
  <text x="360" y="170" text-anchor="middle" font-size="7" fill="#78350f">1</text>
  <rect x="380" y="158" width="80" height="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.5"/>
  <text x="420" y="170" text-anchor="middle" font-size="7" fill="#78350f">R--</text>

  <text x="140" y="195" font-size="9" fill="#475569">...</text>

  <!-- Resultado -->
  <!-- Hit path -->
  <line x1="480" y1="150" x2="560" y2="150" stroke="#16a34a" stroke-width="2" marker-end="url(#aRt)"/>
  <text x="520" y="140" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="bold">TLB Hit</text>

  <!-- Miss path -->
  <line x1="300" y1="210" x2="300" y2="245" stroke="#dc2626" stroke-width="2" marker-end="url(#aRt)"/>
  <text x="340" y="235" font-size="9" fill="#dc2626" font-weight="bold">TLB Miss</text>

  <!-- Tabla de páginas -->
  <rect x="200" y="250" width="200" height="50" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="300" y="272" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold">Tabla de Páginas</text>
  <text x="300" y="290" text-anchor="middle" font-size="8" fill="#991b1b">(en memoria principal)</text>

  <!-- Page fault -->
  <line x1="300" y1="300" x2="300" y2="330" stroke="#7f1d1d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aRt)"/>
  <rect x="200" y="335" width="200" height="30" rx="6" fill="#fef2f2" stroke="#7f1d1d" stroke-width="1"/>
  <text x="300" y="355" text-anchor="middle" font-size="9" fill="#7f1d1d">Fallo de página → Disco / SO</text>

  <!-- Dirección física -->
  <text x="575" y="115" font-size="11" fill="#334155" font-weight="bold">Dir. física:</text>
  <rect x="570" y="130" width="130" height="28" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="635" y="149" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">PPN</text>
  <rect x="570" y="160" width="130" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="635" y="179" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">Desplazamiento</text>

  <!-- Nota -->
  <text x="635" y="210" text-anchor="middle" font-size="8" fill="#64748b">El desplazamiento</text>
  <text x="635" y="222" text-anchor="middle" font-size="8" fill="#64748b">NO cambia</text>

  <!-- A caché -->
  <line x1="635" y1="190" x2="635" y2="250" stroke="#475569" stroke-width="1.5" marker-end="url(#aRt)"/>
  <rect x="570" y="255" width="130" height="30" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="635" y="275" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold">→ Acceso a Caché</text>

  <!-- Tiempos -->
  <rect x="540" y="310" width="180" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="630" y="328" text-anchor="middle" font-size="9" fill="#334155" font-weight="bold">Tiempos típicos</text>
  <text x="630" y="343" text-anchor="middle" font-size="8" fill="#475569">TLB hit: ~0.5-1 ciclo</text>
  <text x="630" y="355" text-anchor="middle" font-size="8" fill="#475569">TLB miss: ~10-100 ciclos</text>
</svg>
