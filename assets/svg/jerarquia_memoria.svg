<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Jerarquía de Memoria</text>

  <!-- Nivel 1: Registros -->
  <polygon points="300,45 380,95 220,95" fill="url(#g1)" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="300" y="80" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Registros</text>

  <!-- Nivel 2: Caché L1 -->
  <polygon points="220,100 380,100 420,155 180,155" fill="url(#g2)" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="300" y="133" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Caché L1</text>

  <!-- Nivel 3: Caché L2 -->
  <polygon points="180,160 420,160 470,215 130,215" fill="url(#g3)" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="300" y="193" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Caché L2</text>

  <!-- Nivel 4: Caché L3 -->
  <polygon points="130,220 470,220 520,275 80,275" fill="url(#g4)" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="300" y="253" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="bold">Caché L3 / LLC</text>

  <!-- Nivel 5: Memoria Principal -->
  <polygon points="80,280 520,280 560,335 40,335" fill="url(#g5)" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="300" y="313" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="bold">Memoria Principal (DRAM)</text>

  <!-- Nivel 6: Almacenamiento -->
  <rect x="20" y="345" width="560" height="55" rx="4" fill="#e2e8f0" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="300" y="377" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="bold">Almacenamiento (SSD / Disco)</text>

  <!-- Flechas laterales -->
  <text x="18" y="80" font-size="10" fill="#16a34a" font-weight="bold">+ Rápida</text>
  <text x="18" y="95" font-size="10" fill="#16a34a">+ Cara</text>
  <text x="18" y="110" font-size="10" fill="#16a34a">− Capacidad</text>

  <line x1="15" y1="120" x2="15" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  
  <text x="18" y="365" font-size="10" fill="#dc2626" font-weight="bold">+ Lenta</text>
  <text x="18" y="380" font-size="10" fill="#dc2626">+ Barata</text>
  <text x="18" y="395" font-size="10" fill="#dc2626">+ Capacidad</text>

  <!-- Etiquetas de tiempo de acceso (derecha) -->
  <text x="585" y="80" text-anchor="end" font-size="9" fill="#475569">~0.3 ns</text>
  <text x="585" y="133" text-anchor="end" font-size="9" fill="#475569">~1 ns</text>
  <text x="585" y="193" text-anchor="end" font-size="9" fill="#475569">~3-10 ns</text>
  <text x="585" y="253" text-anchor="end" font-size="9" fill="#475569">~10-30 ns</text>
  <text x="585" y="313" text-anchor="end" font-size="9" fill="#475569">~50-100 ns</text>
  <text x="585" y="377" text-anchor="end" font-size="9" fill="#475569">~10⁴-10⁷ ns</text>

  <!-- Etiquetas de tamaño (derecha) -->
  <text x="585" y="92" text-anchor="end" font-size="8" fill="#94a3b8">~kB</text>
  <text x="585" y="145" text-anchor="end" font-size="8" fill="#94a3b8">32-64 KB</text>
  <text x="585" y="205" text-anchor="end" font-size="8" fill="#94a3b8">256 KB-1 MB</text>
  <text x="585" y="265" text-anchor="end" font-size="8" fill="#94a3b8">4-64 MB</text>
  <text x="585" y="325" text-anchor="end" font-size="8" fill="#94a3b8">4-128 GB</text>
  <text x="585" y="389" text-anchor="end" font-size="8" fill="#94a3b8">256 GB - TB</text>

  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
