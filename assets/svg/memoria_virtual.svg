<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 420" font-family="Segoe UI, Arial, sans-serif">
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Memoria Virtual: Espacio Virtual → Espacio Físico</text>

  <!-- Espacio virtual -->
  <rect x="30" y="45" width="200" height="350" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="130" y="68" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="bold">Espacio Virtual</text>
  <text x="130" y="83" text-anchor="middle" font-size="9" fill="#7c3aed">(por proceso)</text>

  <rect x="50" y="95" width="160" height="28" rx="4" fill="#c4b5fd" stroke="#7c3aed" stroke-width="1"/>
  <text x="130" y="114" text-anchor="middle" font-size="9" fill="#3b0764">Página V0 (Código)</text>

  <rect x="50" y="128" width="160" height="28" rx="4" fill="#c4b5fd" stroke="#7c3aed" stroke-width="1"/>
  <text x="130" y="147" text-anchor="middle" font-size="9" fill="#3b0764">Página V1 (Datos)</text>

  <rect x="50" y="161" width="160" height="28" rx="4" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="130" y="180" text-anchor="middle" font-size="9" fill="#3b0764">Página V2 (Heap)</text>

  <rect x="50" y="194" width="160" height="28" rx="4" fill="#ede9fe" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="213" text-anchor="middle" font-size="9" fill="#6d28d9">Página V3 (en disco)</text>

  <rect x="50" y="227" width="160" height="28" rx="4" fill="#c4b5fd" stroke="#7c3aed" stroke-width="1"/>
  <text x="130" y="246" text-anchor="middle" font-size="9" fill="#3b0764">Página V4 (Stack)</text>

  <rect x="50" y="260" width="160" height="28" rx="4" fill="#ede9fe" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="279" text-anchor="middle" font-size="9" fill="#6d28d9">Página V5 (en disco)</text>

  <rect x="50" y="298" width="160" height="22" rx="4" fill="#f5f3ff" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="130" y="313" text-anchor="middle" font-size="8" fill="#7c3aed">…</text>

  <rect x="50" y="330" width="160" height="28" rx="4" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="130" y="349" text-anchor="middle" font-size="9" fill="#3b0764">Página VN-1</text>

  <!-- Espacio físico -->
  <rect x="500" y="45" width="210" height="280" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="605" y="68" text-anchor="middle" font-size="11" fill="#065f46" font-weight="bold">Memoria Física (RAM)</text>

  <rect x="520" y="85" width="170" height="28" rx="4" fill="#6ee7b7" stroke="#10b981" stroke-width="1"/>
  <text x="605" y="104" text-anchor="middle" font-size="9" fill="#064e3b">Marco F0 ← V4</text>

  <rect x="520" y="118" width="170" height="28" rx="4" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <text x="605" y="137" text-anchor="middle" font-size="9" fill="#064e3b">Marco F1 ← V0</text>

  <rect x="520" y="151" width="170" height="28" rx="4" fill="#6ee7b7" stroke="#10b981" stroke-width="1"/>
  <text x="605" y="170" text-anchor="middle" font-size="9" fill="#064e3b">Marco F2 ← V2</text>

  <rect x="520" y="184" width="170" height="28" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="605" y="203" text-anchor="middle" font-size="9" fill="#064e3b">Marco F3 (otro proc.)</text>

  <rect x="520" y="217" width="170" height="28" rx="4" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
  <text x="605" y="236" text-anchor="middle" font-size="9" fill="#064e3b">Marco F4 ← V1</text>

  <rect x="520" y="250" width="170" height="28" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="605" y="269" text-anchor="middle" font-size="9" fill="#064e3b">Marco F5 ← VN-1</text>

  <rect x="520" y="283" width="170" height="28" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="0.5"/>
  <text x="605" y="302" text-anchor="middle" font-size="8" fill="#065f46">…</text>

  <!-- Disco -->
  <rect x="500" y="345" width="210" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="605" y="370" text-anchor="middle" font-size="11" fill="#334155" font-weight="bold">Disco / SSD</text>
  <text x="605" y="390" text-anchor="middle" font-size="9" fill="#64748b">V3, V5 (swap)</text>

  <!-- Flechas de mapeo -->
  <defs>
    <marker id="aRm" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#10b981"/>
    </marker>
    <marker id="aRd" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <line x1="210" y1="109" x2="518" y2="132" stroke="#10b981" stroke-width="1.2" marker-end="url(#aRm)"/>
  <line x1="210" y1="142" x2="518" y2="231" stroke="#10b981" stroke-width="1.2" marker-end="url(#aRm)"/>
  <line x1="210" y1="175" x2="518" y2="165" stroke="#10b981" stroke-width="1.2" marker-end="url(#aRm)"/>
  <line x1="210" y1="241" x2="518" y2="99" stroke="#10b981" stroke-width="1.2" marker-end="url(#aRm)"/>
  <line x1="210" y1="344" x2="518" y2="269" stroke="#10b981" stroke-width="1.2" marker-end="url(#aRm)"/>

  <!-- Flechas a disco -->
  <line x1="210" y1="208" x2="498" y2="365" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#aRd)"/>
  <line x1="210" y1="274" x2="498" y2="380" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#aRd)"/>

  <!-- Tabla de páginas (centro) -->
  <rect x="280" y="170" width="150" height="55" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="355" y="190" text-anchor="middle" font-size="10" fill="#92400e" font-weight="bold">Tabla de Páginas</text>
  <text x="355" y="205" text-anchor="middle" font-size="8" fill="#92400e">VPN → PPN</text>
  <text x="355" y="218" text-anchor="middle" font-size="8" fill="#92400e">+ bits de control</text>

  <!-- Leyenda -->
  <rect x="280" y="370" width="180" height="40" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="295" y1="385" x2="330" y2="385" stroke="#10b981" stroke-width="2"/>
  <text x="335" y="389" font-size="8" fill="#334155">En memoria física</text>
  <line x1="295" y1="400" x2="330" y2="400" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="335" y="404" font-size="8" fill="#334155">En disco (page fault)</text>
</svg>
