<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Segoe UI, Arial, sans-serif">
  <text x="350" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Caché Multinivel (L1 / L2 / L3)</text>

  <defs>
    <marker id="aD" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="aU" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="180">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- CPU -->
  <rect x="280" y="45" width="140" height="40" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <text x="350" y="70" text-anchor="middle" font-size="13" fill="white" font-weight="bold">CPU</text>

  <!-- L1 -->
  <rect x="220" y="110" width="110" height="40" rx="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
  <text x="275" y="130" text-anchor="middle" font-size="10" fill="white" font-weight="bold">L1-I (Instruc.)</text>
  <rect x="370" y="110" width="110" height="40" rx="6" fill="#dc2626" stroke="#991b1b" stroke-width="1.5"/>
  <text x="425" y="130" text-anchor="middle" font-size="10" fill="white" font-weight="bold">L1-D (Datos)</text>

  <!-- L2 -->
  <rect x="240" y="175" width="220" height="40" rx="6" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="350" y="200" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Caché L2 (Unificada)</text>

  <!-- L3 -->
  <rect x="170" y="240" width="360" height="40" rx="6" fill="#0891b2" stroke="#0e7490" stroke-width="1.5"/>
  <text x="350" y="265" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Caché L3 / LLC (Compartida entre núcleos)</text>

  <!-- Flechas -->
  <line x1="310" y1="85" x2="285" y2="108" stroke="#475569" stroke-width="1.5" marker-end="url(#aD)"/>
  <line x1="390" y1="85" x2="415" y2="108" stroke="#475569" stroke-width="1.5" marker-end="url(#aD)"/>
  <line x1="310" y1="150" x2="320" y2="173" stroke="#475569" stroke-width="1.5" marker-end="url(#aD)"/>
  <line x1="390" y1="150" x2="380" y2="173" stroke="#475569" stroke-width="1.5" marker-end="url(#aD)"/>
  <line x1="350" y1="215" x2="350" y2="238" stroke="#475569" stroke-width="1.5" marker-end="url(#aD)"/>

  <!-- Etiquetas laterales -->
  <text x="560" y="130" font-size="9" fill="#64748b">~1 ns | 32-64 KB</text>
  <text x="560" y="200" font-size="9" fill="#64748b">~3-10 ns | 256 KB-1 MB</text>
  <text x="560" y="265" font-size="9" fill="#64748b">~10-30 ns | 4-64 MB</text>

  <!-- Flecha a memoria principal -->
  <text x="350" y="295" text-anchor="middle" font-size="10" fill="#64748b">↓ Memoria Principal (DRAM) ~50-100 ns</text>

  <!-- Notas -->
  <text x="55" y="130" font-size="9" fill="#2563eb">Separada</text>
  <text x="55" y="145" font-size="9" fill="#2563eb">(Harvard)</text>
  <text x="55" y="200" font-size="9" fill="#7c3aed">Por núcleo</text>
  <text x="55" y="265" font-size="9" fill="#0891b2">Compartida</text>
</svg>
