<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 320" font-family="Segoe UI, Arial, sans-serif">
  <text x="370" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Memoria Entrelazada (Interleaved Memory)</text>

  <defs>
    <marker id="aDn" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,0 L8,0 L4,8 Z" fill="#475569"/>
    </marker>
    <marker id="aUp" markerWidth="8" markerHeight="8" refX="4" refY="0" orient="auto">
      <path d="M4,0 L8,8 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- CPU / Controlador -->
  <rect x="250" y="42" width="240" height="35" rx="6" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <text x="370" y="65" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Controlador de memoria</text>

  <!-- Bus -->
  <line x1="120" y1="95" x2="620" y2="95" stroke="#64748b" stroke-width="3"/>
  <text x="640" y="99" font-size="9" fill="#64748b">Bus</text>
  
  <line x1="370" y1="77" x2="370" y2="95" stroke="#475569" stroke-width="2"/>

  <!-- Bancos -->
  <rect x="60" y="120" width="120" height="160" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="145" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">Banco 0</text>
  <line x1="120" y1="95" x2="120" y2="120" stroke="#475569" stroke-width="1.5"/>

  <rect x="75" y="160" width="90" height="20" rx="3" fill="#3b82f6"/>
  <text x="120" y="175" text-anchor="middle" font-size="8" fill="white">Dir 0</text>
  <rect x="75" y="182" width="90" height="20" rx="3" fill="#60a5fa"/>
  <text x="120" y="197" text-anchor="middle" font-size="8" fill="white">Dir 4</text>
  <rect x="75" y="204" width="90" height="20" rx="3" fill="#93c5fd"/>
  <text x="120" y="219" text-anchor="middle" font-size="8" fill="#1e3a8a">Dir 8</text>
  <rect x="75" y="226" width="90" height="20" rx="3" fill="#bfdbfe"/>
  <text x="120" y="241" text-anchor="middle" font-size="8" fill="#1e3a8a">Dir 12</text>
  <rect x="75" y="248" width="90" height="20" rx="3" fill="#dbeafe"/>
  <text x="120" y="263" text-anchor="middle" font-size="8" fill="#1e3a8a">…</text>

  <rect x="220" y="120" width="120" height="160" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="280" y="145" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">Banco 1</text>
  <line x1="280" y1="95" x2="280" y2="120" stroke="#475569" stroke-width="1.5"/>

  <rect x="235" y="160" width="90" height="20" rx="3" fill="#22c55e"/>
  <text x="280" y="175" text-anchor="middle" font-size="8" fill="white">Dir 1</text>
  <rect x="235" y="182" width="90" height="20" rx="3" fill="#4ade80"/>
  <text x="280" y="197" text-anchor="middle" font-size="8" fill="white">Dir 5</text>
  <rect x="235" y="204" width="90" height="20" rx="3" fill="#86efac"/>
  <text x="280" y="219" text-anchor="middle" font-size="8" fill="#14532d">Dir 9</text>
  <rect x="235" y="226" width="90" height="20" rx="3" fill="#bbf7d0"/>
  <text x="280" y="241" text-anchor="middle" font-size="8" fill="#14532d">Dir 13</text>
  <rect x="235" y="248" width="90" height="20" rx="3" fill="#dcfce7"/>
  <text x="280" y="263" text-anchor="middle" font-size="8" fill="#14532d">…</text>

  <rect x="380" y="120" width="120" height="160" rx="8" fill="#fef3c7" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="440" y="145" text-anchor="middle" font-size="11" fill="#854d0e" font-weight="bold">Banco 2</text>
  <line x1="440" y1="95" x2="440" y2="120" stroke="#475569" stroke-width="1.5"/>

  <rect x="395" y="160" width="90" height="20" rx="3" fill="#eab308"/>
  <text x="440" y="175" text-anchor="middle" font-size="8" fill="white">Dir 2</text>
  <rect x="395" y="182" width="90" height="20" rx="3" fill="#facc15"/>
  <text x="440" y="197" text-anchor="middle" font-size="8" fill="#78350f">Dir 6</text>
  <rect x="395" y="204" width="90" height="20" rx="3" fill="#fde047"/>
  <text x="440" y="219" text-anchor="middle" font-size="8" fill="#78350f">Dir 10</text>
  <rect x="395" y="226" width="90" height="20" rx="3" fill="#fef08a"/>
  <text x="440" y="241" text-anchor="middle" font-size="8" fill="#78350f">Dir 14</text>
  <rect x="395" y="248" width="90" height="20" rx="3" fill="#fef9c3"/>
  <text x="440" y="263" text-anchor="middle" font-size="8" fill="#78350f">…</text>

  <rect x="540" y="120" width="120" height="160" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="600" y="145" text-anchor="middle" font-size="11" fill="#9d174d" font-weight="bold">Banco 3</text>
  <line x1="600" y1="95" x2="600" y2="120" stroke="#475569" stroke-width="1.5"/>

  <rect x="555" y="160" width="90" height="20" rx="3" fill="#ec4899"/>
  <text x="600" y="175" text-anchor="middle" font-size="8" fill="white">Dir 3</text>
  <rect x="555" y="182" width="90" height="20" rx="3" fill="#f472b6"/>
  <text x="600" y="197" text-anchor="middle" font-size="8" fill="white">Dir 7</text>
  <rect x="555" y="204" width="90" height="20" rx="3" fill="#f9a8d4"/>
  <text x="600" y="219" text-anchor="middle" font-size="8" fill="#831843">Dir 11</text>
  <rect x="555" y="226" width="90" height="20" rx="3" fill="#fbcfe8"/>
  <text x="600" y="241" text-anchor="middle" font-size="8" fill="#831843">Dir 15</text>
  <rect x="555" y="248" width="90" height="20" rx="3" fill="#fce7f3"/>
  <text x="600" y="263" text-anchor="middle" font-size="8" fill="#831843">…</text>

  <!-- Clave -->
  <rect x="80" y="293" width="580" height="22" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="370" y="308" text-anchor="middle" font-size="10" fill="#334155">Banco = Dirección mod N.º bancos → Accesos consecutivos van a bancos distintos → Paralelismo</text>
</svg>
